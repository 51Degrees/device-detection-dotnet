name: Selenium API tests

# Runs the shared Selenium contract for this repo's example against the live cloud.
on:
  push:  # TEMPORARY: run on any branch push (no PR needed) — remove before merge
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  selenium-api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out device-detection-dotnet
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Check out device-detection-dotnet-examples
        uses: actions/checkout@v4
        with:
          repository: 51Degrees/device-detection-dotnet-examples
          path: device-detection-dotnet-examples
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Check out selenium-api-tests (outside this repo's global.json)
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/51Degrees/selenium-api-tests.git" \
            ../selenium-api-tests

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build the shared contract tests (.NET 10, outside global.json)
        run: cd ../selenium-api-tests && dotnet build SeleniumApiTests.csproj -c Release

      - name: Point the example at the dev library
        run: |
          # Use the dev device-detection projects instead of the published package.
          sed -i 's#<PackageReference Include="FiftyOne.DeviceDetection" Version="[^"]*" />#<ProjectReference Include="../../../FiftyOne.DeviceDetection/FiftyOne.DeviceDetection.csproj" />#' \
            device-detection-dotnet-examples/Examples/ExampleBase/FiftyOne.DeviceDetection.Examples.csproj
          # Align the example's FiftyOne.Pipeline.Web with the version the dev library uses,
          # so the build has a single FiftyOne.Pipeline.Core.
          pipever=$(grep -oE 'FiftyOne\.Pipeline\.CloudRequestEngine" Version="[0-9.]+"' \
            FiftyOne.DeviceDetection.Cloud/FiftyOne.DeviceDetection.Cloud.csproj \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          pipever="${pipever:-4.5.46}"
          echo "Aligning example FiftyOne.Pipeline.Web to $pipever"
          sed -i "s#Include=\"FiftyOne.Pipeline.Web\" Version=\"[^\"]*\"#Include=\"FiftyOne.Pipeline.Web\" Version=\"$pipever\"#" \
            device-detection-dotnet-examples/Examples/Cloud/GettingStarted-Web/GettingStarted-Web.csproj

      - name: Launch the example and run the contract
        env:
          ASPNETCORE_URLS: http://localhost:8095
          FIFTYONE_CLOUD_ENDPOINT: https://cloud.51degrees.com/api/v4/
          SUPER_RESOURCE_KEY: ${{ secrets.SUPER_RESOURCE_KEY }}
          EXAMPLE_URL: http://localhost:8095
          EXAMPLE_LANG: dotnet
        run: |
          # Build first so a build error fails the step clearly (uses .NET 8 via global.json).
          pushd device-detection-dotnet-examples/Examples/Cloud/GettingStarted-Web
          dotnet build -c Release
          dotnet run -c Release --no-build --no-launch-profile &
          example_pid=$!
          popd
          for i in $(seq 1 30); do
            curl -sf -o /dev/null "http://localhost:8095/" && break || sleep 2
          done
          # Run the shared contract against the live cloud (.NET 10, outside global.json).
          printf '{ "cloud_root_url": "https://cloud.51degrees.com/", "paid_resource_key": "%s" }\n' \
            "$SUPER_RESOURCE_KEY" > "$RUNNER_TEMP/testConfig.json"
          pushd ../selenium-api-tests
          TEST_CONFIG_FILE="$RUNNER_TEMP/testConfig.json" \
            dotnet test SeleniumApiTests.csproj -c Release --no-build \
              --filter 'FullyQualifiedName~ExampleClientSideOverride|FullyQualifiedName~ExampleRenderTests'
          status=$?
          popd
          kill "$example_pid" 2>/dev/null || true
          exit $status
